name: release-deploy

on:
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE_NAME: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
  ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || github.event.repository.name }}
  CLOUD_SQL_INSTANCE: ${{ vars.GCP_CLOUD_SQL_INSTANCE }}
  APP_ENV: ${{ vars.GCP_APP_ENV || 'staging' }}
  PAYMENTS_PROVIDER: ${{ vars.PAYMENTS_PROVIDER || 'stripe' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Google Cloud Platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev"

      - name: Set image URI
        run: |
          echo "IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push release image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t "${IMAGE_URI}" \
            --push \
            .

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_URI }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ secrets.GCP_RUNTIME_SERVICE_ACCOUNT }}
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }}
            --set-env-vars=APP_ENV=${{ env.APP_ENV }},PAYMENTS_PROVIDER=${{ env.PAYMENTS_PROVIDER }},APP_VERSION=${{ steps.version.outputs.tag }}
            --set-secrets=DATABASE_URL=payments-service-database-url:latest,STRIPE_SECRET_KEY=payments-service-stripe-secret-key:latest,STRIPE_PUBLISHABLE_KEY=payments-service-stripe-publishable-key:latest,STRIPE_WEBHOOK_SECRET=payments-service-stripe-webhook-secret:latest

      - name: Show deployed URL
        run: |
          gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)'
